name: quickfix
description: "QuickFix AI hyperlocal service marketplace app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.5.0
  flutter_hooks: ^0.20.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  google_maps_flutter: ^2.6.1
  razorpay_flutter: ^1.3.7
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  image_picker: ^1.1.2
  share_plus: ^9.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

